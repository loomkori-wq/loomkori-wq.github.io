<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d0d0d">
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Loom's personal profile. A 16+ year-old programmer always looking to make new friends.">
    <meta name="author" content="Loom">
    
    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="Loom | Profile">
    <meta property="og:description" content="Loom's personal profile. A 16+ year-old programmer always looking to make new friends.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://loomkori-wq.github.io/">
    <!-- Using UI Avatars as a fallback image for OG -->
    <meta property="og:image" content="https://ui-avatars.com/api/?name=Loom&background=1a1a1a&color=e7d57b&size=512">

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Loom | Profile">
    <meta name="twitter:description" content="Loom's personal profile. A 16+ year-old programmer always looking to make new friends.">
    <meta name="twitter:image" content="https://ui-avatars.com/api/?name=Loom&background=1a1a1a&color=e7d57b&size=512">



    <title data-i18n="title">Loom | Profile</title>
    
    <!-- Preconnect for Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">

    <link rel="stylesheet" href="style.css?v=1.5">
    <link
        href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Outfit:wght@300;400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
</head>

<body>

    <div id="loading-screen">
        <div class="loader-ring"></div>
        <p class="loader-text"><span data-i18n="loader">Establishing connection</span><span class="loader-dots">...</span></p>
    </div>

    <div id="main-layout" class="hidden">
        <div class="scanlines"></div>
        <canvas id="bg-canvas"></canvas>
        <div class="overlay"></div>

        <audio id="bg-audio">
            <source src="assets/takeaslice.mp3" type="audio/mpeg">
        </audio>

        <button id="mute-btn" class="mute-btn" title="Toggle Music" data-i18n-title="mute">
            <i class="fas fa-volume-up"></i>
        </button>

        <div class="lang-switcher" id="lang-switcher">
            <div class="lang-indicator" id="lang-indicator"></div>
            <button class="lang-btn active" data-lang="EN">EN</button>
            <button class="lang-btn" data-lang="PT">PT</button>
        </div>


        <main class="profile-card">

            <div class="card-content">
                <div class="avatar-container">
                    <img src="https://ui-avatars.com/api/?name=F&background=random&size=150" alt="Profile Picture"
                        class="avatar">
                    <div class="status-dot">
                        <span class="status-tooltip" id="status-tooltip" data-i18n="offline">Offline</span>
                    </div>
                </div>

                <h1 class="name">Faustino</h1>
                <p class="tagline">@faustino</p>

                <div class="social-links">
                    <a href="https://www.roblox.com/users/3561671159/profile" target="_blank" rel="noopener noreferrer" class="social-icon"
                        aria-label="Roblox"><svg class="roblox-svg" viewBox="0 0 512 512" fill="currentColor" width="20"
                            height="20">
                            <path
                                d="M124.539 0L0 387.47 387.461 512 512 124.53 124.539 0zM283.395 340.267l-112.676-29.958 29.958-112.676 112.676 29.958-29.958 112.676z" />
                        </svg></a>
                    <a href="https://www.instagram.com/garbielp.p" target="_blank" rel="noopener noreferrer" class="social-icon"
                        aria-label="Instagram"><i class="fab fa-instagram"></i></a>
                    <a href="https://mail.google.com/mail/?view=cm&to=loomkori@gmail.com" target="_blank" rel="noopener noreferrer"
                        class="social-icon email-icon" aria-label="Gmail">
                        <i class="fas fa-envelope"></i>
                        <span class="email-tooltip">loomkori@gmail.com</span>
                    </a>
                    <a href="https://discord.com/users/833078738022563940" target="_blank" rel="noopener noreferrer" class="social-icon"
                        aria-label="Discord"><i class="fab fa-discord"></i></a>
                </div>
            </div>

            <div class="bottom-bar" id="bottom-bar">
                <div class="bar-header">
                    <span class="bar-title" data-i18n="bar_title">more about me...</span>
                    <i class="fas fa-chevron-down toggle-icon"></i>
                </div>
                <div class="bar-details">
                    <div class="main-action-wrapper">
                        <button class="about-btn primary-main-btn" data-modal="aboutme">
                            <i class="fas fa-user-astronaut"></i>
                            <span data-i18n="btn_about">About Me</span>
                        </button>
                    </div>
                    <div class="about-scroll-row">
                        <button class="about-btn" data-modal="games">
                            <i class="fas fa-gamepad"></i>
                            <span data-i18n="btn_games">Games</span>
                        </button>
                        <button class="about-btn" data-modal="anime">
                            <i class="fas fa-dragon"></i>
                            <span data-i18n="btn_anime">Anime</span>
                        </button>
                        <button class="about-btn" data-modal="communities">
                            <i class="fas fa-users"></i>
                            <span data-i18n="btn_communities">Communities</span>
                        </button>
                        <button class="about-btn" data-modal="skills">
                            <i class="fas fa-terminal"></i>
                            <span data-i18n="btn_skills">Skills</span>
                        </button>
                        <button class="about-btn" data-modal="likings">
                            <i class="fas fa-star"></i>
                            <span data-i18n="btn_likings">Likings</span>
                        </button>
                        <button class="about-btn" data-modal="learning">
                            <i class="fas fa-book-open"></i>
                            <span data-i18n="btn_learning">Learning</span>
                        </button>
                        <button class="about-btn" data-modal="comforts">
                            <i class="fas fa-cloud-moon"></i>
                            <span data-i18n="btn_comforts">Comforts</span>
                        </button>
                        <button class="about-btn" data-modal="funfacts">
                            <i class="fas fa-wand-magic-sparkles"></i>
                            <span data-i18n="btn_funfacts">Fun Facts</span>
                        </button>
                        <button class="about-btn" data-modal="goals">
                            <i class="fas fa-rocket"></i>
                            <span data-i18n="btn_goals">Goals</span>
                        </button>
                        <button class="about-btn" data-modal="talktome">
                            <i class="fas fa-comment-dots"></i>
                            <span data-i18n="btn_talk">Talk to Me</span>
                        </button>
                        <button class="about-btn lover-btn" data-modal="lover">
                            <i class="fas fa-heart"></i>
                            <span data-i18n="btn_lover">Lover</span>
                        </button>
                    </div>
                </div>
            </div>
        </main>

        <div class="modal-overlay" id="modal-overlay">
            <div class="modal-card">
                <button class="modal-close" id="modal-close"><i class="fas fa-xmark"></i></button>
                <h2 class="modal-title" id="modal-title"></h2>
                <div class="modal-body" id="modal-body"></div>
            </div>
        </div>
    </div>

    <!-- ── Messaging System ── -->
    <button class="fab-msg" id="fab-msg" aria-label="Send Message" data-i18n-aria="msg_title"><i class="fas fa-envelope"></i></button>

    <div class="msg-overlay" id="msg-overlay">
        <div class="msg-card">
            <div class="msg-header">
                <h3><i class="fas fa-paper-plane"></i> <span data-i18n="msg_title">Send a Message</span></h3>
            </div>
            <form id="msg-form">
                <!-- Honeypot: hidden from humans, bots fill it in -->
                <div class="msg-honeypot" aria-hidden="true">
                    <label for="msg-website">Website</label>
                    <input type="text" id="msg-website" name="website" tabindex="-1" autocomplete="off">
                </div>
                <div class="msg-field-group" id="msg-method-grp">
                    <label for="msg-contact-method" data-i18n="msg_method">Reply-To Method</label>
                    <select id="msg-contact-method" required>
                        <option value="" disabled selected data-i18n="msg_method_placeholder">Select a contact method...</option>
                        <option value="name" data-i18n="msg_method_anon">Just a Name (no reply needed)</option>
                        <option value="discord" data-i18n="msg_method_discord">Discord</option>
                        <option value="email" data-i18n="msg_method_email">Email Address</option>
                        <option value="phone" data-i18n="msg_method_phone">Phone Number</option>
                        <option value="roblox" data-i18n="msg_method_roblox">Roblox Username</option>
                    </select>
                </div>
                <div class="msg-field-group" id="msg-detail-grp" style="display: none;">
                    <label for="msg-contact-detail" id="msg-detail-label" data-i18n="msg_detail">Username / Address</label>
                    <input type="text" id="msg-contact-detail" autocomplete="off">
                </div>
                <div class="msg-anon-row">
                    <input type="checkbox" id="msg-anon">
                    <label for="msg-anon"><i class="fas fa-user-secret"></i> <span data-i18n="msg_anon">Send Anonymously</span></label>
                </div>
                <div class="msg-field-group">
                    <label for="msg-topic" data-i18n="msg_topic">Topic</label>
                    <input type="text" id="msg-topic" required autocomplete="off">
                </div>
                <div class="msg-field-group">
                    <label for="msg-message" data-i18n="msg_message">Message</label>
                    <textarea id="msg-message" rows="4" required></textarea>
                </div>
                <div class="msg-actions">
                    <button type="button" class="msg-btn msg-btn-back" id="msg-back"><i class="fas fa-arrow-left"></i>
                        <span data-i18n="msg_back">Back</span></button>
                    <button type="submit" class="msg-btn msg-btn-send" id="msg-send-btn"><i
                            class="fas fa-paper-plane"></i> <span id="msg-send-text" data-i18n="msg_send">Send</span></button>
                </div>
            </form>
        </div>
    </div>

    <div class="msg-toast" id="msg-toast">
        <i class="fas fa-check-circle"></i> <span data-i18n="toast_sent">Message sent!</span>
    </div>

    <div class="msg-toast msg-toast-warn" id="msg-toast-warn">
        <i class="fas fa-clock"></i> <span id="msg-warn-text" data-i18n="toast_warn">Please wait before sending another message.</span>
    </div>

    <div class="custom-cursor">
        <svg viewBox="0 0 100 100" class="solver-svg" xmlns="http://www.w3.org/2000/svg">
            <polygon points="50,30 67.32,40 67.32,60 50,70 32.68,60 32.68,40" fill="none" class="solver-hex"
                stroke="currentColor" stroke-width="6" stroke-linejoin="round" />
            <g>
                <line x1="50" y1="30" x2="50" y2="10" stroke="currentColor" stroke-width="6" stroke-linecap="round" />
                <polygon points="50,0 62,15 50,20 38,15" fill="currentColor" stroke="currentColor" stroke-width="2"
                    stroke-linejoin="round" />
            </g>
            <g transform="rotate(120 50 50)">
                <line x1="50" y1="30" x2="50" y2="10" stroke="currentColor" stroke-width="6" stroke-linecap="round" />
                <polygon points="50,0 62,15 50,20 38,15" fill="currentColor" stroke="currentColor" stroke-width="2"
                    stroke-linejoin="round" />
            </g>
            <g transform="rotate(240 50 50)">
                <line x1="50" y1="30" x2="50" y2="10" stroke="currentColor" stroke-width="6" stroke-linecap="round" />
                <polygon points="50,0 62,15 50,20 38,15" fill="currentColor" stroke="currentColor" stroke-width="2"
                    stroke-linejoin="round" />
            </g>
        </svg>
    </div>
    <script src="translations.js?v=1.6"></script>
    <script src="app.js?v=1.6"></script>
</body>

</html>
